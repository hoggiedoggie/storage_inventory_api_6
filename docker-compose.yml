version: '3.8'

services:
  # 1. Документоориентированная СУБД (MongoDB 6) — Замена PostgreSQL
  mongo:
    image: mongo:6
    container_name: storage_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Сервис кеширования (Redis 7)
  redis:
    image: redis:7-alpine
    container_name: storage_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 3. FastAPI приложение (Backend)
  app:
    build: .
    container_name: storage_api
    ports:
      - "8000:8000"
    env_file:
      - .env  
    environment:
      - MONGO_URI=${MONGO_URI}
      - REDIS_HOST=redis
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mongo_data:
  redis_data: